name: Build IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "export THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Build IPA
      run: make package

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Rumble.ipa
        path: packages/*.ipa