name: Build IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Theos
      run: |
        brew update
        brew install ldid xz
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        mkdir -p $HOME/theos/sdks
        curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS15.6.sdk.tar.xz | tar -xJv -C $HOME/theos/sdks/

    - name: Build IPA
      run: make package

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Rumble.ipa
        path: packages/*.ipa